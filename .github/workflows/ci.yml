name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Use pnpm 11
        run: corepack prepare pnpm@11.1.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build GitHub Pages bundle
        run: pnpm build:pages

      - name: Typecheck
        run: pnpm typecheck

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Visual smoke
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: pnpm visual:smoke
